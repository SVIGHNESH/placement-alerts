# Place this file at:  .github/workflows/job-alerts.yml  in your GitHub repository.
# Runs 4x daily (6:30 AM, 12:30 PM, 6:30 PM, 11:30 PM IST), posts new drives to
# Telegram, and refreshes the live portal page (docs/index.html) for GitHub Pages.

name: Placement Job Alerts

on:
  schedule:
    - cron: "0 1,7,13,18 * * *"   # UTC = 06:30, 12:30, 18:30, 23:30 IST
  workflow_dispatch: {}            # manual run from the Actions tab

permissions:
  contents: write

jobs:
  alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run job alert bot + portal builder
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python job_alerts.py

      - name: Save state and portal
        run: |
          git config user.name "job-alert-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen.json jobs.json docs/ || true
          git diff --cached --quiet || git commit -m "refresh alerts and portal [skip ci]"
          git push
